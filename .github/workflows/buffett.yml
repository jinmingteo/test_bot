name: Buffett Finder Daily

on:
  schedule:
    # Target 07:00 SGT Mon-Fri. Cron is UTC, so 23:00 UTC Sun-Thu = 07:00 SGT Mon-Fri.
    # Scheduled early to absorb GitHub Actions' typical 1-3 hr scheduler delay
    # and still land before mid-morning Asia.
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      markets:
        description: "Markets to run (space-separated: sgx us hk)"
        default: "sgx us hk"
        required: false
      top:
        description: "Top N passers per market"
        default: "5"
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Log run time (measure scheduler delay)
        run: |
          echo "Scheduled cron (UTC):     ${{ github.event.schedule || 'manual dispatch' }}"
          echo "Actual start time (UTC):  $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Actual start time (SGT):  $(TZ=Asia/Singapore date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Trigger event:            ${{ github.event_name }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run telegram bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python telegram_bot.py \
            --markets ${{ github.event.inputs.markets || 'sgx us hk' }} \
            --top ${{ github.event.inputs.top || '5' }}
